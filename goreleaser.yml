project_name: xzap

builds:
  - id: xzap-macos
    main: ./main.go
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X xzap/cmd.Version={{.Version}}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md

release:
  github:
    owner: ApptitudeLabs
    name: xzap

brews:
  - name: xzap
    repository:
      owner: ApptitudeLabs
      name: homebrew-xzap
    install: |
      bin.install "xzap"
