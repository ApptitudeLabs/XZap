project_name: xclean

builds:
  - id: xclean-macos
    main: ./main.go
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X xclean/cmd.Version={{.Version}}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md

release:
  github:
    owner: ApptitudeLabs
    name: xclean

brews:
  - name: xclean
    repository:
      owner: ApptitudeLabs
      name: homebrew-xclean
    install: |
      bin.install "xclean"
